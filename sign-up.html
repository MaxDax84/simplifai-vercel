<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrati – Simplif-AI</title>
  <link rel="stylesheet" href="/theme.css" />

  <style>
    .auth-wrap{
      min-height: calc(100vh - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
  
    #clerk-signup{
      width: 100%;
      max-width: 420px;
    }
  </style>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_bm9ibGUtYm94ZXItMjMuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://noble-boxer-23.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js">
  </script>
</head>

<body>
  <div class="wrap">
    <div class="auth-wrap">
      <div class="card auth-card">
        <div class="card-inner">
          <span class="pilltag">✨ REGISTRAZIONE</span>
          <div class="h1">Crea il tuo account</div>
          <p class="sub">Email o Google.</p>

          <div style="height:14px"></div>

          <div id="clerk-signup"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      function getRedirectUrl(){
        const u = new URL(location.href);
        return u.searchParams.get("redirect_url") || "/app.html";
      }

      async function boot(){
        if (!window.Clerk) return setTimeout(boot, 50);

        await window.Clerk.load();

        if (window.Clerk.user) {
          location.replace(getRedirectUrl());
          return;
        }

        const node = document.getElementById("clerk-signup");
        window.Clerk.mountSignUp(node, {
          afterSignUpUrl: getRedirectUrl(),
          signInUrl: "/sign-in.html"
        });
      }

      boot();
    })();
  </script>
</body>
</html>
