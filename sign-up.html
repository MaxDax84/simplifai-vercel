<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrati – Simplif-AI</title>
  <link rel="stylesheet" href="/theme.css" />

  <style>
      .auth-wrap{
        padding: 60px 16px 80px;
      }
    
      .auth-card{
        max-width: 720px;
        margin: 0 auto;
      }
    
      #clerk-signup{
        margin-top: 20px;
      }
    
      .cl-card {
        background: transparent !important;
        box-shadow: none !important;
      }
    
      .cl-headerTitle,
      .cl-headerSubtitle {
        display: none !important;
      }
    
      .cl-formFieldInput {
        background: rgba(255,255,255,0.08) !important;
        border: 1px solid rgba(255,255,255,0.15) !important;
        color: #fff !important;
      }
    
      .cl-formButtonPrimary {
        background: linear-gradient(135deg, #5b8cff, #7f5bff) !important;
        border: none !important;
      }
    
      .cl-socialButtonsBlockButton {
        background: rgba(255,255,255,0.08) !important;
        border: 1px solid rgba(255,255,255,0.15) !important;
        color: #fff !important;
      }
    </style>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_bm9ibGUtYm94ZXItMjMuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://noble-boxer-23.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js">
  </script>
</head>

<body>
  <div class="wrap">
    <div class="auth-wrap">
      <div class="card auth-card">
        <div class="card-inner">
          <span class="pilltag">✨ REGISTRAZIONE</span>
          <div class="h1">Crea il tuo account</div>
          <p class="sub">Email o Google.</p>

          <div style="height:14px"></div>

          <div id="clerk-signup"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      function getRedirectUrl(){
        const u = new URL(location.href);
        return u.searchParams.get("redirect_url") || "/app.html";
      }

      async function boot(){
        if (!window.Clerk) return setTimeout(boot, 50);

        await window.Clerk.load();

        if (window.Clerk.user) {
          location.replace(getRedirectUrl());
          return;
        }

        const node = document.getElementById("clerk-signup");
        window.Clerk.mountSignUp(node, {
          afterSignUpUrl: getRedirectUrl(),
          signInUrl: "/sign-in.html"
        });
      }

      boot();
    })();
  </script>
</body>
</html>
