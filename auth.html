<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simplif-AI – Accedi</title>
  <link rel="stylesheet" href="/theme.css">

  <style>
    .auth-wrap{
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 0;
    }
    .auth-card{
      width: min(420px, 92vw);
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: 20px;
      padding: 32px 28px;
    }
    .auth-logo{
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-logo h1{
      font-size: 24px;
      font-weight: 900;
      margin: 0 0 4px;
    }
    .auth-logo p{
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }
    .tabs{
      display: flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .tab-btn{
      flex: 1;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: .15s;
    }
    .tab-btn.active{
      background: rgba(124,92,255,.18);
      color: var(--text);
    }
    .form-group{
      margin-bottom: 16px;
    }
    label{
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"]{
      width: 100%;
      background: rgba(0,0,0,.22);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: .15s;
    }
    input:focus{
      border-color: rgba(124,92,255,.55);
      box-shadow: 0 0 0 4px rgba(124,92,255,.12);
    }
    .btn-auth{
      width: 100%;
      margin-top: 8px;
    }
    .auth-msg{
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: var(--muted);
    }
    .auth-msg.error{ color: #ff6b6b; }
    .auth-msg.success{ color: #5cf2a8; }
    .divider{
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after{
      content: "";
      flex: 1;
      border-top: 1px solid var(--border);
    }
    .btn-magic{
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }
    .btn-magic:hover{
      background: rgba(255,255,255,.04);
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Simplif-AI</h1>
          <span>Concetti complessi spiegati in modo semplice.</span>
        </div>
      </div>
      <nav id="mainNav">
        <a href="/index.html" data-nav="home">Home</a>
        <a href="/come-funziona.html" data-nav="how">Come funziona</a>
        <a href="/prezzi.html" data-nav="pricing">Prezzi</a>
      </nav>
      <button class="nav-toggle" id="navToggle" type="button" aria-label="Apri menu">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="mobile-nav" id="mobileNav">
      <a href="/index.html">Home</a>
      <a href="/come-funziona.html">Come funziona</a>
      <a href="/prezzi.html">Prezzi</a>
    </div>

    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">
          <h1>Benvenuto</h1>
          <p>Accedi o crea il tuo account per usare Simplif-AI</p>
        </div>

        <div class="tabs">
          <button class="tab-btn active" id="tabLogin" type="button">Accedi</button>
          <button class="tab-btn" id="tabSignup" type="button">Registrati</button>
        </div>

        <!-- Login form -->
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="tua@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
          </div>
          <button class="btn btn-primary btn-auth" type="submit" id="loginBtn">Accedi</button>
        </form>

        <!-- Signup form (hidden by default) -->
        <form id="signupForm" style="display:none">
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="tua@email.com" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="Almeno 6 caratteri" required minlength="6" />
          </div>
          <button class="btn btn-primary btn-auth" type="submit" id="signupBtn">Crea account</button>
        </form>

        <div class="divider">oppure</div>

        <button class="btn btn-magic" id="magicBtn" type="button">✉ Ricevi link magico via email</button>
        <form id="magicForm" style="display:none; margin-top:12px;">
          <div class="form-group">
            <label for="magicEmail">Email</label>
            <input type="email" id="magicEmail" placeholder="tua@email.com" required />
          </div>
          <button class="btn btn-primary btn-auth" type="submit">Invia link</button>
        </form>

        <div class="auth-msg" id="authMsg"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    /* Mobile nav */
    (function(){
      const toggle = document.getElementById("navToggle");
      const mobileNav = document.getElementById("mobileNav");
      if(!toggle || !mobileNav) return;
      toggle.addEventListener("click", () => document.body.classList.toggle("nav-open"));
      mobileNav.querySelectorAll("a").forEach(a => a.addEventListener("click", () => document.body.classList.remove("nav-open")));
    })();

    const SUPABASE_URL  = "https://lmmiowagyqypdrdcemdo.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtbWlvd2FneXF5cGRyZGNlbWRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODg3NDQsImV4cCI6MjA4ODM2NDc0NH0.0DJYe_MFImUsRIrrAtJOY2Jkua-wDCFPOLC-MCkdvoc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    /* Se l'utente è già loggato, vai subito all'app */
    sb.auth.getSession().then(({ data }) => {
      if (data?.session) window.location.replace("/app.html");
    });

    /* Tabs */
    const tabLogin  = document.getElementById("tabLogin");
    const tabSignup = document.getElementById("tabSignup");
    const loginForm  = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    tabLogin.addEventListener("click", () => {
      tabLogin.classList.add("active"); tabSignup.classList.remove("active");
      loginForm.style.display = ""; signupForm.style.display = "none";
      clearMsg();
    });
    tabSignup.addEventListener("click", () => {
      tabSignup.classList.add("active"); tabLogin.classList.remove("active");
      signupForm.style.display = ""; loginForm.style.display = "none";
      clearMsg();
    });

    /* Magic link toggle */
    const magicBtn  = document.getElementById("magicBtn");
    const magicForm = document.getElementById("magicForm");
    magicBtn.addEventListener("click", () => {
      magicForm.style.display = magicForm.style.display === "none" ? "" : "none";
    });

    /* Messaggi */
    const authMsg = document.getElementById("authMsg");
    function showMsg(text, type = "") {
      authMsg.textContent = text;
      authMsg.className = "auth-msg " + type;
    }
    function clearMsg() { authMsg.textContent = ""; authMsg.className = "auth-msg"; }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? "..." : btn.dataset.label;
    }

    /* Login */
    const loginBtn = document.getElementById("loginBtn");
    loginBtn.dataset.label = "Accedi";
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      setLoading(loginBtn, true);
      clearMsg();
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        showMsg(error.message, "error");
        setLoading(loginBtn, false);
      } else {
        showMsg("Accesso effettuato. Reindirizzo...", "success");
        setTimeout(() => window.location.replace("/app.html"), 800);
      }
    });

    /* Signup */
    const signupBtn = document.getElementById("signupBtn");
    signupBtn.dataset.label = "Crea account";
    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      setLoading(signupBtn, true);
      clearMsg();
      const email    = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const { error } = await sb.auth.signUp({ email, password });
      if (error) {
        showMsg(error.message, "error");
        setLoading(signupBtn, false);
      } else {
        showMsg("Account creato! Controlla la tua email per confermare.", "success");
        setLoading(signupBtn, false);
      }
    });

    /* Magic link */
    magicForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("magicEmail").value.trim();
      const btn = magicForm.querySelector("button[type=submit]");
      btn.disabled = true; btn.textContent = "...";
      const { error } = await sb.auth.signInWithOtp({ email });
      if (error) {
        showMsg(error.message, "error");
      } else {
        showMsg("Link inviato! Controlla la tua email.", "success");
        magicForm.style.display = "none";
      }
      btn.disabled = false; btn.textContent = "Invia link";
    });
  </script>
</body>
</html>
