<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simplif-AI – App</title>
  <link rel="stylesheet" href="/theme.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>

  <style>
    /* Reset e stili base */
    .section{ margin-top:22px; }
    .title{ font-weight:900; font-size:20px; margin: 10px 0 25px; display: block; }
    textarea{ width:100%; min-height:180px; background:rgba(0,0,0,.18); border:1px solid var(--border); border-radius:14px; padding:12px; color:var(--text); margin-bottom: 24px; outline:none; }
    
    /* Layout pulsanti e grid */
    .actions{ display:flex; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:10px; align-items:center; }
    .targets-grid, .len-grid{ display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:12px; margin-bottom: 24px; }
    @media(max-width:900px){ .targets-grid, .len-grid{ grid-template-columns:1fr; } }

    .target-card, .len-card{ border:1px solid var(--border); background:rgba(255,255,255,.03); border-radius:16px; padding:14px; cursor:pointer; transition:.15s ease; }
    .target-card.active, .len-card.active{ border-color:rgba(124,92,255,.55); background:rgba(124,92,255,.14); }
    
    .response-shell{ border:1px solid var(--border); background: rgba(255,255,255,.03); border-radius:16px; padding:16px; min-height:260px; margin-bottom: 24px; }
    .status{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:10px; }
    .spinner{ width:14px; height:14px; border:2px solid rgba(255,255,255,.25); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .md p{ margin: 10px 0; line-height: 1.6; }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand"><div class="logo"></div><div><h1>Simplif-AI</h1></div></div>
      <div class="credit-pill">⚡ Crediti: <b id="creditsValue">—</b></div>
    </header>

    <section class="section" id="sec1">
      <div class="card" id="card1">
        <h2 class="title">✦ Scrivi la domanda</h2>
        <textarea id="query" placeholder="Esempio: Spiegami i buchi neri..."></textarea>
        <div class="actions">
          <button class="btn btn-primary" id="goTargets">Scegli target ↓</button>
        </div>
      </div>
    </section>

    <section class="section" id="sec2">
      <div class="card" id="card2">
        <h2 class="title">🎯 Seleziona il target</h2>
        <div class="targets-grid" id="targets"></div>
        <div class="actions">
          <button class="btn" id="backToQ">↑ Indietro</button>
          <button class="btn btn-primary" id="goLength" disabled>Scegli lunghezza ↓</button>
        </div>
      </div>
    </section>

    <section class="section" id="secLen">
      <div class="card" id="cardLen">
        <h2 class="title">🧾 Lunghezza</h2>
        <div class="len-grid" id="lengths"></div>
        <div class="actions">
          <button class="btn" id="backToTargets">↑ Cambia target</button>
        </div>
      </div>
    </section>

    <section class="section" id="sec3">
      <div class="card" id="card3">
        <h2 class="title">💬 Risposta</h2>
        <div class="response-shell">
          <div id="response" class="md"></div>
          <div class="status">
            <span id="spinner" class="spinner" style="display:none"></span>
            <span id="status">Pronto.</span>
          </div>
        </div>
        <div class="actions">
          <div style="display:flex; gap:10px;">
            <button class="btn" id="backToLen">↑ Lunghezza</button>
            <button class="btn" id="backToTargetsFinal">↑ Target</button>
          </div>
          <button class="btn" id="copyBtn" disabled>Copia</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    // --- CONFIGURAZIONE ---
    const TARGETS = [
      { label:"Bambino", icon:"🧒", desc:"Semplice.", prompt:"Spiega come a un bambino di 8 anni.", baseTokens:400 },
      { label:"Ragazzo", icon:"👨", desc:"Chiaro.", prompt:"Spiega come a un adolescente.", baseTokens:600 },
      { label:"Universitario", icon:"🎓", desc:"Accademico.", prompt:"Spiega come a uno studente universitario.", baseTokens:800 },
      { label:"Adulto", icon:"👤", desc:"Pratico.", prompt:"Spiega come a un adulto occupato.", baseTokens:700 },
      { label:"Esperto", icon:"🧠", desc:"Tecnico.", prompt:"Spiega come a un professionista del settore.", baseTokens:1000 },
      { label:"Scienziato", icon:"🧪", desc:"Rigoroso.", prompt:"Spiega come a un ricercatore scientifico.", baseTokens:1200 }
    ];

    const LENGTHS = [
      { key:"breve", label:"Breve", multiplier:0.5, instruction:"Rispondi in max 3 paragrafi." },
      { key:"medio", label:"Medio", multiplier:1.0, instruction:"Rispondi in modo equilibrato." },
      { key:"lungo", label:"Lungo", multiplier:2.0, instruction:"Rispondi in modo molto dettagliato." }
    ];

    let selectedTargetIndex = -1;
    let selectedLenKey = "";
    let accumulatedText = "";
    let isGenerating = false;

    // --- ELEMENTI DOM ---
    const q = document.getElementById("query");
    const responseEl = document.getElementById("response");
    const statusEl = document.getElementById("status");
    const spinner = document.getElementById("spinner");

    // --- FUNZIONI NAVIGAZIONE ---
    function scrollTo(id) {
      document.getElementById(id).scrollIntoView({ behavior:"smooth", block:"start" });
    }

    function setStatus(text, loading=false) {
      statusEl.textContent = text;
      spinner.style.display = loading ? "inline-block" : "none";
    }

    // --- LOGICA API ---
    async function run() {
      if (isGenerating || !q.value.trim() || selectedTargetIndex < -1 || !selectedLenKey) return;
      
      console.log("Inizio generazione...");
      isGenerating = true;
      accumulatedText = "";
      responseEl.innerHTML = "";
      setStatus("Sto scrivendo...", true);

      const t = TARGETS[selectedTargetIndex];
      const l = LENGTHS.find(x => x.key === selectedLenKey);

      try {
        const res = await fetch("/api/gemini", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: q.value.trim(),
            targetPrompt: t.prompt + " " + l.instruction,
            mode: "start",
            maxTokens: Math.floor(t.baseTokens * l.multiplier)
          })
        });

        if (!res.ok) throw new Error("Errore Server");

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          
          // Parsing semplice dello stream SSE
          const lines = chunk.split("\n");
          for (let line of lines) {
            if (line.startsWith("data: ")) {
              try {
                const data = JSON.parse(line.slice(6));
                const text = data.candidates[0].content.parts[0].text;
                accumulatedText += text;
                responseEl.innerHTML = DOMPurify.sanitize(marked.parse(accumulatedText));
              } catch(e) {}
            }
          }
        }
        setStatus("Fatto.");
      } catch (e) {
        console.error(e);
        setStatus("Errore durante la generazione.");
      } finally {
        isGenerating = false;
        document.getElementById("copyBtn").disabled = false;
      }
    }

    // --- RENDERING ---
    function renderTargets() {
      const grid = document.getElementById("targets");
      grid.innerHTML = "";
      TARGETS.forEach((t, i) => {
        const div = document.createElement("div");
        div.className = `target-card ${i === selectedTargetIndex ? 'active' : ''}`;
        div.innerHTML = `<b>${t.icon} ${t.label}</b><br><small>${t.desc}</small>`;
        div.onclick = () => {
          selectedTargetIndex = i;
          renderTargets();
          document.getElementById("goLength").disabled = false;
          scrollTo("secLen");
        };
        grid.appendChild(div);
      });
    }

    function renderLengths() {
      const grid = document.getElementById("lengths");
      grid.innerHTML = "";
      LENGTHS.forEach(l => {
        const div = document.createElement("div");
        div.className = `len-card ${l.key === selectedLenKey ? 'active' : ''}`;
        div.innerHTML = `<b>${l.label}</b>`;
        div.onclick = () => {
          selectedLenKey = l.key;
          renderLengths();
          scrollTo("sec3");
          run();
        };
        grid.appendChild(div);
      });
    }

    // --- EVENTI ---
    document.getElementById("goTargets").onclick = () => scrollTo("sec2");
    document.getElementById("backToQ").onclick = () => scrollTo("sec1");
    document.getElementById("goLength").onclick = () => scrollTo("secLen");
    document.getElementById("backToTargets").onclick = () => scrollTo("sec2");
    document.getElementById("backToTargetsFinal").onclick = () => scrollTo("sec2");
    document.getElementById("backToLen").onclick = () => scrollTo("secLen");
    document.getElementById("copyBtn").onclick = () => {
      navigator.clipboard.writeText(accumulatedText);
      alert("Copiato!");
    };

    // Inizializza
    renderTargets();
    renderLengths();
  </script>
</body>
</html>
